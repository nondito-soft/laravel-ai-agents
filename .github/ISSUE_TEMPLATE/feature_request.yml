name: Feature request
description: Suggest a new agent, instruction, prompt, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New agent
        - New file-type instruction
        - New reusable prompt
        - New frontend stack support
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the recurring Laravel/AI workflow gap this addresses.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added or changed? Mention whether it applies to the Copilot layer, the Claude Code layer, or both.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've tried.
