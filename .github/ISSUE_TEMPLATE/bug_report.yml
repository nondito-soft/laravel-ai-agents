name: Bug report
description: Something doesn't work as documented
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: tool
    attributes:
      label: AI tool
      description: Which tool's layer is affected?
      options:
        - GitHub Copilot (.github/)
        - Claude Code (.claude/)
        - Both
        - Docs only
    validations:
      required: true
  - type: input
    id: file
    attributes:
      label: Affected file(s)
      description: Which agent, instruction, or prompt file is involved?
      placeholder: e.g. agents/developer.md
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did the agent/instruction do, and what did you expect instead?
      placeholder: Describe the behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it? Include the prompt/command you used.
      placeholder: |
        1. Copy the template into a Laravel 11 project
        2. Run /scaffold-module Department
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Tool versions and project setup.
      placeholder: |
        - Claude Code / Copilot version:
        - Laravel version:
        - FRONTEND stack:
